services:
  postgres:
    image: docker.io/library/postgres:17
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: mydb
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d mydb"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    command: sh -c "bun run migrate && bun run start"
    env_file: .env
    environment:
      DATABASE_URL: postgresql://admin:password@postgres:5432/mydb
    ports:
      - "3001:3001"
    volumes:
      - images_data:/app/images
    depends_on:
      postgres:
        condition: service_healthy

  seed:
    build:
      context: .
      dockerfile: Dockerfile.seed
    command: bun run seed
    env_file: .env
    environment:
      DATABASE_URL: postgresql://admin:password@postgres:5432/mydb
    volumes:
      - ./src/db/seed/db_source:/app/src/db/seed/db_source
      - images_data:/app/images
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

volumes:
  postgres_data:
  images_data:
