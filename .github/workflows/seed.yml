name: Seed Database

on:
  workflow_dispatch:
    inputs:
      limit:
        description: 'Max records to process (0 = all)'
        required: false
        default: '100'
      concurrency:
        description: 'Number of concurrent workers'
        required: false
        default: '3'

jobs:
  seed:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: admin
          POSTGRES_PASSWORD: password
          POSTGRES_DB: mydb
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Download NPI CSV from release assets
        run: |
          mkdir -p src/db/seed/db_source
          gh release download seed-data \
            --pattern "npidata_pfile_*.csv" \
            --dir src/db/seed/db_source
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run migrations
        run: bun run migrate
        env:
          DATABASE_URL: postgresql://admin:password@localhost:5432/mydb

      - name: Run seed
        run: |
          ARGS=""
          if [ "${{ inputs.limit }}" != "0" ]; then
            ARGS="$ARGS --limit=${{ inputs.limit }}"
          fi
          ARGS="$ARGS --concurrency=${{ inputs.concurrency }}"
          bun run seed $ARGS
        env:
          DATABASE_URL: postgresql://admin:password@localhost:5432/mydb
          IMAGE_STORAGE_BACKEND: r2
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          R2_PUBLIC_BASE_URL: ${{ secrets.R2_PUBLIC_BASE_URL }}
          WEBMD_CLIENT_ID: ${{ secrets.WEBMD_CLIENT_ID }}
          WEBMD_ENC_DATA: ${{ secrets.WEBMD_ENC_DATA }}
          WEBMD_TIMESTAMP: ${{ secrets.WEBMD_TIMESTAMP }}
