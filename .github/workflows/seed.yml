name: Seed Database

on:
  workflow_dispatch:
    inputs:
      limit:
        description: 'Max records to process (0 = all)'
        required: false
        default: '100'
      concurrency:
        description: 'Number of concurrent workers'
        required: false
        default: '3'

jobs:
  seed:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Download and extract NPI CSV from release assets
        run: |
          mkdir -p src/db/seed/db_source
          gh release download seed-data \
            --pattern "npidata_pfile_*.zip" \
            --dir src/db/seed/db_source
          unzip -o src/db/seed/db_source/npidata_pfile_*.zip \
            -d src/db/seed/db_source
          rm src/db/seed/db_source/*.zip
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run migrations
        run: bun run migrate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Run seed
        run: |
          ARGS=""
          if [ "${{ inputs.limit }}" != "0" ]; then
            ARGS="$ARGS --limit=${{ inputs.limit }}"
          fi
          ARGS="$ARGS --concurrency=${{ inputs.concurrency }}"
          bun run seed $ARGS
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          IMAGE_STORAGE_BACKEND: r2
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          R2_PUBLIC_BASE_URL: ${{ secrets.R2_PUBLIC_BASE_URL }}
          WEBMD_CLIENT_ID: ${{ secrets.WEBMD_CLIENT_ID }}
          WEBMD_ENC_DATA: ${{ secrets.WEBMD_ENC_DATA }}
          WEBMD_TIMESTAMP: ${{ secrets.WEBMD_TIMESTAMP }}
